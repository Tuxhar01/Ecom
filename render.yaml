services:
  - type: web
    name: ecom-backend
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecom-db
          property: connectionString
      - key: AIRA_WEBHOOK_URL
        sync: false
      - key: AIRA_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: ecom-db
    databaseName: bookstore
    user: bookstore_user
    plan: free

